<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness OS • Learning</title>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: #f8f9fa; }
    #sidebar { width: 400px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; }
    #main { flex: 1; padding: 30px; overflow-y: auto; }
    
    .session-card {
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #eee;
      transition: all 0.2s;
    }
    .session-card:hover { background: #f8f9fa; }
    .session-card.completed { background: #d4edda; border-color: #28a745; }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .session-title { font-weight: 500; flex: 1; }

    .duration {
      font-size: 0.82em;
      color: #666;
      background: #f1f1f1;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
    }

    .progress-container {
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #28a745;
      width: 0%;
    }
    .progress-text {
      font-size: 0.8em;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }

    #player-container { margin: 25px 0; background: #f0f0f0; border-radius: 8px; min-height: 240px; padding: 20px; text-align: center; }
    .ai-lesson-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Wellness OS Learning</h2>
    
    <select id="pillar-select" onchange="switchPillar()" style="width:100%; padding:10px; margin:15px 0; border-radius:6px;">
      <option value="Pillar 1 — Mental & Emotional Wellness">Pillar 1 — Mental & Emotional Wellness</option>
      <option value="Pillar 2 — Sleep / Recovery & Circadian Regulation">Pillar 2 — Sleep / Recovery & Circadian Regulation</option>
    </select>

    <div id="pillar-objective" style="margin-bottom:20px; font-size:0.95em; line-height:1.5; color:#444;"></div>
    
    <div id="session-list">Loading sessions...</div>
  </div>

  <div id="main">
    <h1 id="session-title">Select a session from the left</h1>
    <div id="session-desc" style="margin-bottom:20px; color:#555; min-height:60px;"></div>
    
    <div id="player-container">
      <div id="content-area">
        <p style="color:#666;">Select a session to load content</p>
      </div>
    </div>

    <button id="complete-btn" onclick="completeSession()" style="display:none; background:#28a745; color:white; border:none; padding:12px 20px; border-radius:6px; font-weight:bold; margin-top:15px;">
      ✅ Mark Complete & Microassessment
    </button>
    
    <div id="assessment-area" style="display:none; margin-top:20px; padding:20px; background:white; border:1px solid #ddd; border-radius:8px;"></div>
  </div>

  <script>
    let sessions = [];
    let currentSessionIndex = null;

    const pillarObjectives = {
      "Pillar 1 — Mental & Emotional Wellness": "Upon completing this module, you will understand stress physiology, nervous system regulation, emotional resilience tools, and how to build cognitive and mood foundations for daily life.",
      "Pillar 2 — Sleep / Recovery & Circadian Regulation": "Upon completing this module, you will understand sleep architecture, circadian biology, practical sleep optimization, and how to build effective recovery systems."
    };

    async function loadSessions(pillar) {
      document.getElementById('pillar-objective').textContent = pillarObjectives[pillar] || "";
      const listEl = document.getElementById('session-list');
      listEl.innerHTML = "Loading...";

      try {
        const res = await fetch(`https://wellness-curriculum.eamiller1981.workers.dev/sessions?pillar=${encodeURIComponent(pillar)}`);
        const data = await res.json();

        sessions = (data.results || []).map(page => {
          const p = page.properties || {};
          return {
            id: page.id,
            microtopic: p.Microtopic?.title?.[0]?.plain_text || p.Name?.title?.[0]?.plain_text || "Untitled",
            sessionTitle: p["Session Title"]?.rich_text?.[0]?.plain_text || "",
            source: p.Source?.rich_text?.[0]?.plain_text || "",
            youtubeURL: p["YouTube URL"]?.url || "",
            keyTakeaways: p["Key Takeaways"]?.rich_text?.[0]?.plain_text || "",
            isAI: !p["YouTube URL"]?.url || p["YouTube URL"]?.url === "",
            aiContent: p["AI Content"]?.rich_text?.[0]?.plain_text || "This is a synthesized lesson based on approved sources.",
            completed: false,
            duration: parseFloat(p["Duration (min)"]?.number) || 25
          };
        });

        renderSessions();
      } catch (err) {
        listEl.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    }

    function renderSessions() {
      const container = document.getElementById('session-list');
      container.innerHTML = sessions.map((s, i) => `
        <div class="session-card" onclick="loadSession(${i})">
          <div class="session-header">
            <div class="session-title">${s.microtopic}</div>
            <div class="duration">${s.duration} min</div>
          </div>
          <div class="progress-container">
            <div class="progress-fill" style="width: 0%"></div>
          </div>
          <div class="progress-text">0% watched</div>
        </div>
      `).join('');
    }

    function loadSession(i) {
      currentSessionIndex = i;
      const s = sessions[i];

      document.getElementById('session-title').textContent = s.sessionTitle || s.microtopic;
      document.getElementById('session-desc').innerHTML = `<strong>${s.source}</strong><br>${s.keyTakeaways || ''}`;

      const container = document.getElementById('content-area');

      if (s.isAI) {
        container.innerHTML = `
          <div style="padding:60px 20px; background:#f8f9fa; border-radius:8px; text-align:center;">
            <p><strong>AI-Generated Audio Lesson</strong></p>
            <p style="margin:15px 0;">${s.microtopic}</p>
            <button onclick="playAILesson()" style="background:#007bff; color:white; border:none; padding:12px 24px; border-radius:6px; cursor:pointer;">▶️ Play AI Audio Lesson</button>
          </div>`;
      } else if (s.youtubeURL) {
        const videoId = s.youtubeURL.includes('v=') 
          ? s.youtubeURL.split('v=')[1].split('&')[0] 
          : s.youtubeURL.split('/').pop().split('?')[0];

        container.innerHTML = `<div id="youtube-player"></div>`;

        new YT.Player('youtube-player', {
          height: '390',
          width: '640',
          videoId: videoId,
          playerVars: { autoplay: 1 }
        });
      }
    }

    function playAILesson() {
      const s = sessions[currentSessionIndex];
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(s.aiContent || "This is a synthesized lesson.");
        utterance.rate = 0.95;
        speechSynthesis.speak(utterance);
      } else {
        alert("Browser TTS not supported.");
      }
    }

    function completeSession() {
      alert("Session marked complete. Microassessment would appear here.");
    }

    function speakToApp() {
      const query = prompt("Ask anything:");
      if (query) alert("AI Coach: " + query);
    }

    function switchPillar() {
      const selected = document.getElementById('pillar-select').value;
      loadSessions(selected);
    }

    window.onload = () => loadSessions("Pillar 1 — Mental & Emotional Wellness");
  </script>
</body>
</html>
