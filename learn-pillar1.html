<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness OS • Pillar 1 Test</title>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; 
      display: flex; 
      height: 100vh; 
      background: #f8f9fa; 
    }
    #sidebar { 
      width: 340px; 
      background: white; 
      border-right: 1px solid #ddd; 
      overflow-y: auto; 
      padding: 20px; 
    }
    #main { 
      flex: 1; 
      padding: 30px; 
      overflow-y: auto; 
    }
    .session { 
      padding: 14px; 
      margin-bottom: 8px; 
      border-radius: 8px; 
      cursor: pointer; 
      border: 1px solid #eee; 
      transition: all 0.2s;
    }
    .session:hover { background: #f0f0f0; }
    .session.completed { background: #d4edda; border-color: #28a745; }
    #player-container { margin: 25px 0; background: #000; border-radius: 8px; overflow: hidden; }
    .microassessment { 
      background: white; 
      border: 1px solid #ddd; 
      padding: 25px; 
      border-radius: 12px; 
      margin-top: 30px; 
    }
    button { 
      padding: 12px 20px; 
      margin: 5px 5px 5px 0; 
      border-radius: 6px; 
      font-size: 15px;
    }
    .complete-btn { background: #28a745; color: white; border: none; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Pillar 1: Mental & Emotional Wellness</h2>
    <p><small>Testing audio-first learning flow</small></p>
    <div id="session-list">Loading sessions from Notion...</div>
    
    <div style="margin-top: 40px;">
      <button onclick="speakToApp()">🎤 Speak to the App</button>
      <div id="recap-output" style="margin-top:10px; font-size:0.9em; line-height:1.4;"></div>
    </div>
  </div>

  <div id="main">
    <h1 id="session-title">Select a session from the left to begin</h1>
    <div id="session-desc" style="margin-bottom:20px; color:#555;"></div>
    
    <div id="player-container">
      <div id="youtube-player"></div>
    </div>

    <button id="complete-btn" class="complete-btn" onclick="completeSession()" style="display:none;">
      ✅ Mark Session Complete & Take Microassessment
    </button>
    
    <div id="assessment-area" class="microassessment" style="display:none;"></div>
  </div>

  <script>
    let sessions = [];
    let currentSessionIndex = null;
    let player = null;

    // Fetch Pillar 1 from your Cloudflare Worker
    async function loadSessions() {
      try {
        const res = await fetch('https://wellness-curriculum.eamiller1981.workers.dev/sessions?pillar=Pillar 1 — Mental & Emotional Wellness');
        if (!res.ok) throw new Error('Worker returned ' + res.status);
        
        const data = await res.json();
        
        sessions = data.results.map(page => {
          const p = page.properties;
          return {
            id: page.id,
            microtopic: p.Microtopic?.title?.[0]?.plain_text || "Untitled",
            sessionTitle: p["Session Title"]?.rich_text?.[0]?.plain_text || "",
            source: p.Source?.rich_text?.[0]?.plain_text || "",
            youtubeURL: p["YouTube URL"]?.url || "",
            startTime: parseInt(p["Start Time (sec)"]?.number) || 0,
            endTime: parseInt(p["End Time (sec)"]?.number) || 1200,
            keyTakeaways: p["Key Takeaways"]?.rich_text?.[0]?.plain_text || "",
            completed: false
          };
        });

        renderSessions();
      } catch (err) {
        document.getElementById('session-list').innerHTML = 
          `<p style="color:red;">Error: ${err.message}<br><small>Check worker URL and pillar name match.</small></p>`;
      }
    }

    function renderSessions() {
      const container = document.getElementById('session-list');
      container.innerHTML = sessions.map((s, i) => `
        <div class="session ${s.completed ? 'completed' : ''}" onclick="loadSession(${i})">
          ${s.completed ? '✅ ' : ''}${s.microtopic}
        </div>
      `).join('');
    }

    function loadSession(i) {
      currentSessionIndex = i;
      const s = sessions[i];

      document.getElementById('session-title').textContent = s.sessionTitle || s.microtopic;
      document.getElementById('session-desc').innerHTML = `<strong>${s.source}</strong><br>${s.keyTakeaways}`;

      document.getElementById('complete-btn').style.display = 'none';
      document.getElementById('assessment-area').style.display = 'none';

      if (player) player.destroy();

      const videoId = s.youtubeURL.includes('v=') 
        ? s.youtubeURL.split('v=')[1].split('&')[0] 
        : s.youtubeURL.split('/').pop().split('?')[0];

      player = new YT.Player('youtube-player', {
        height: '390',
        width: '640',
        videoId: videoId,
        playerVars: { autoplay: 1, start: s.startTime },
        events: {
          onReady: (event) => event.target.playVideo(),
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.PLAYING) {
              const timer = setInterval(() => {
                if (player.getCurrentTime() >= s.endTime) {
                  player.pauseVideo();
                  clearInterval(timer);
                  document.getElementById('complete-btn').style.display = 'block';
                }
              }, 800);
            }
          }
        }
      });
    }

    function completeSession() {
      if (currentSessionIndex === null) return;
      sessions[currentSessionIndex].completed = true;
      renderSessions();

      const area = document.getElementById('assessment-area');
      area.style.display = 'block';
      area.innerHTML = `
        <h3>Microassessment — ${sessions[currentSessionIndex].microtopic}</h3>
        <p>Reflect on today's session:</p>
        <textarea id="user-answer" rows="4" style="width:100%; margin-bottom:10px;" placeholder="How would you apply one concept from this session in daily life?"></textarea>
        <button onclick="submitAssessment()">Submit Reflection</button>
        <p id="feedback" style="margin-top:15px; color:#28a745;"></p>
      `;
    }

    function submitAssessment() {
      document.getElementById('feedback').innerHTML = 
        '✅ Reflection saved! <br><small>In the full version this would trigger AI scoring + adaptive coaching if needed.</small>';
    }

    function speakToApp() {
      const query = prompt("Ask the coach anything about Pillar 1:");
      if (!query) return;
      document.getElementById('recap-output').innerHTML = 
        `<strong>AI Coach reply:</strong><br>${query}<br><em>(Real synthesized audio recap coming in next iteration)</em>`;
    }

    // Start the app
    window.onload = loadSessions;
  </script>
</body>
</html>
