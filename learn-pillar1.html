<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness OS • Learning</title>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: #f8f9fa; }
    #sidebar { width: 400px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; }
    #main { flex: 1; padding: 30px; overflow-y: auto; }
    
    .session-card {
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #eee;
      transition: all 0.2s;
    }
    .session-card:hover { background: #f8f9fa; }
    .session-card.completed { background: #d4edda; border-color: #28a745; }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .session-title { font-weight: 500; flex: 1; }

    .duration {
      font-size: 0.82em;
      color: #666;
      background: #f1f1f1;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
      white-space: nowrap;
    }

    .progress-container {
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #28a745;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 0.8em;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }

    #player-container { margin: 25px 0; background: #000; border-radius: 8px; overflow: hidden; min-height: 200px; }
    .ai-lesson-btn { 
      background: #007bff; 
      color: white; 
      border: none; 
      padding: 14px; 
      border-radius: 6px; 
      width: 100%; 
      margin-top: 10px; 
      cursor: pointer; 
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Wellness OS Learning</h2>
    
    <select id="pillar-select" onchange="switchPillar()" style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px; font-size:15px;">
      <option value="Pillar 1 — Mental & Emotional Wellness">Pillar 1 — Mental & Emotional Wellness</option>
      <option value="Pillar 2 — Sleep, Recovery & Circadian Regulation">Pillar 2 — Sleep, Recovery & Circadian Regulation</option>
    </select>

    <div id="pillar-objective" style="margin-bottom:20px; font-size:0.95em; line-height:1.5; color:#444;"></div>
    
    <div id="session-list">Loading...</div>
    
    <div style="margin-top: 40px;">
      <button onclick="speakToApp()">🎤 Speak to the App</button>
    </div>
  </div>

  <div id="main">
    <h1 id="session-title">Select a session from the left to begin</h1>
    <div id="session-desc" style="margin-bottom:20px; color:#555;"></div>
    
    <div id="player-container">
      <div id="youtube-player"></div>
      <button id="ai-lesson-btn" class="ai-lesson-btn" onclick="playAILesson()" style="display:none;">
        ▶️ Play AI-Generated Audio Lesson
      </button>
    </div>

    <button id="complete-btn" onclick="completeSession()" style="display:none; background:#28a745; color:white; border:none; padding:12px 20px; border-radius:6px; font-weight:bold;">
      ✅ Mark Session Complete & Take Microassessment
    </button>
    
    <div id="assessment-area" class="microassessment" style="display:none; margin-top:20px;"></div>
  </div>

  <script>
    let sessions = [];
    let currentSessionIndex = null;
    let player = null;

    const pillarObjectives = {
      "Pillar 1 — Mental & Emotional Wellness": "Upon completing this module, you will understand stress physiology, nervous system regulation, emotional resilience tools, and how to build cognitive and mood foundations for daily life.",
      "Pillar 2 — Sleep, Recovery & Circadian Regulation": "Upon completing this module, you will understand sleep architecture, circadian biology, practical sleep optimization, and how to build effective recovery systems."
    };

    async function loadSessions(pillar) {
      currentPillar = pillar;
      document.getElementById('pillar-objective').textContent = pillarObjectives[pillar] || "";

      const listEl = document.getElementById('session-list');
      listEl.innerHTML = "Loading sessions...";

      try {
        const res = await fetch(`https://wellness-curriculum.eamiller1981.workers.dev/sessions?pillar=${encodeURIComponent(pillar)}`);
        const data = await res.json();

        sessions = (data.results || []).map(page => {
          const p = page.properties || {};
          const sessionId = page.id;

          return {
            id: sessionId,
            microtopic: p.Microtopic?.title?.[0]?.plain_text || 
                        p.Name?.title?.[0]?.plain_text || 
                        "Untitled",
            sessionTitle: p["Session Title"]?.rich_text?.[0]?.plain_text || "",
            source: p.Source?.rich_text?.[0]?.plain_text || "",
            youtubeURL: p["YouTube URL"]?.url || "",
            keyTakeaways: p["Key Takeaways"]?.rich_text?.[0]?.plain_text || "",
            isAI: !p["YouTube URL"]?.url || p["YouTube URL"]?.url === "",
            completed: false,
            lastPosition: parseFloat(localStorage.getItem(`progress_${sessionId}`)) || 0,
            duration: parseFloat(p["Duration (min)"]?.number) || 0   // ← Reads directly from Notion
          };
        });

        renderSessions();
      } catch (err) {
        listEl.innerHTML = `<p style="color:red;">Load error: ${err.message}</p>`;
        console.error(err);
      }
    }

    function renderSessions() {
      const container = document.getElementById('session-list');
      container.innerHTML = sessions.map((s, i) => {
        const percent = s.duration ? Math.round((s.lastPosition / s.duration) * 100) : 0;
        const durationDisplay = s.duration ? 
          (s.duration > 60 ? `${Math.floor(s.duration/60)}h ${s.duration % 60} min` : `${s.duration} min`) : 
          (s.isAI ? "25 min" : "— min");

        return `
          <div class="session-card ${s.completed ? 'completed' : ''}" onclick="loadSession(${i})">
            <div class="session-header">
              <div class="session-title">${s.microtopic}</div>
              <div class="duration">${durationDisplay}</div>
            </div>
            <div class="progress-container">
              <div class="progress-fill" id="progress-fill-${s.id}" style="width: ${percent}%"></div>
            </div>
            <div class="progress-text" id="progress-text-${s.id}">
              ${percent}% watched
            </div>
          </div>
        `;
      }).join('');
    }

    function loadSession(i) {
      currentSessionIndex = i;
      const s = sessions[i];

      document.getElementById('session-title').textContent = s.sessionTitle || s.microtopic;
      document.getElementById('session-desc').innerHTML = `<strong>${s.source}</strong><br>${s.keyTakeaways || ''}`;

      document.getElementById('complete-btn').style.display = 'none';
      document.getElementById('assessment-area').style.display = 'none';
      document.getElementById('ai-lesson-btn').style.display = s.isAI ? 'block' : 'none';

      if (player) player.destroy();
      document.getElementById('youtube-player').innerHTML = '';

      if (s.isAI) {
        document.getElementById('youtube-player').innerHTML = `
          <div style="padding:60px 20px; text-align:center; color:#666; background:#f8f9fa; border-radius:8px;">
            <p><strong>AI-Generated Audio Lesson</strong></p>
            <p style="font-size:0.9em;">${s.microtopic}</p>
          </div>`;
        return;
      }

      const videoId = s.youtubeURL.includes('v=') 
        ? s.youtubeURL.split('v=')[1].split('&')[0] 
        : s.youtubeURL.split('/').pop().split('?')[0];

      player = new YT.Player('youtube-player', {
        height: '390',
        width: '640',
        videoId: videoId,
        playerVars: { autoplay: 1 },
        events: {
          onReady: (e) => {
            if (s.lastPosition > 30) e.target.seekTo(s.lastPosition);
            e.target.playVideo();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) startProgressTracking(s.id);
            else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) saveProgress(s.id);
          }
        }
      });
    }

    function playAILesson() {
      if (currentSessionIndex === null) return;
      const s = sessions[currentSessionIndex];
      alert(`🎧 Playing AI Audio Lesson:\n\n${s.microtopic}\n\n(This is a simulation — real TTS integration coming soon.)`);
    }

    function startProgressTracking(sessionId) {
      console.log("Progress tracking started for", sessionId);
    }

    function saveProgress(sessionId) {
      if (!player || !sessionId) return;
      const currentTime = player.getCurrentTime();
      localStorage.setItem(`progress_${sessionId}`, currentTime);
    }

    function completeSession() {
      if (currentSessionIndex === null) return;
      saveProgress(sessions[currentSessionIndex].id);
      sessions[currentSessionIndex].completed = true;
      renderSessions();

      const area = document.getElementById('assessment-area');
      area.style.display = 'block';
      area.innerHTML = `
        <h3>Microassessment — ${sessions[currentSessionIndex].microtopic}</h3>
        <textarea id="user-answer" rows="5" style="width:100%; margin:10px 0;" placeholder="What were the key takeaways? How will you apply them?"></textarea>
        <button onclick="submitAssessment()">Submit Reflection</button>
        <p id="feedback" style="margin-top:15px; color:#28a745;"></p>
      `;
    }

    function submitAssessment() {
      document.getElementById('feedback').innerHTML = '✅ Reflection saved.';
    }

    function speakToApp() {
      const query = prompt("Ask the coach anything:");
      if (query) alert("AI Coach would reply here.");
    }

    function switchPillar() {
      const selected = document.getElementById('pillar-select').value;
      loadSessions(selected);
    }

    window.addEventListener('beforeunload', () => {
      if (currentSessionIndex !== null) saveProgress(sessions[currentSessionIndex].id);
    });

    window.onload = () => loadSessions("Pillar 1 — Mental & Emotional Wellness");
  </script>
</body>
</html>
