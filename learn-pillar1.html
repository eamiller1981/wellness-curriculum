<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness OS • Pillar 1 Test</title>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: #f8f9fa; }
    #sidebar { width: 360px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; }
    #main { flex: 1; padding: 30px; overflow-y: auto; }
    .session { 
      padding: 14px; 
      margin-bottom: 8px; 
      border-radius: 8px; 
      cursor: pointer; 
      border: 1px solid #eee; 
    }
    .session:hover { background: #f0f0f0; }
    .session.completed { background: #d4edda; border-color: #28a745; }
    #player-container { margin: 25px 0; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
    .progress-container { margin-top: 10px; }
    .progress-bar { height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #28a745; width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 0.85em; color: #666; margin-top: 4px; }
    .microassessment { 
      background: white; 
      border: 1px solid #ddd; 
      padding: 25px; 
      border-radius: 12px; 
      margin-top: 30px; 
    }
    button { padding: 12px 20px; margin: 8px 8px 8px 0; border-radius: 6px; }
    .complete-btn { background: #28a745; color: white; border: none; font-weight: bold; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Pillar 1: Mental & Emotional Wellness</h2>
    <p><small>Full episodes • Progress saved automatically</small></p>
    <div id="session-list"></div>
    
    <div style="margin-top: 40px;">
      <button onclick="speakToApp()">🎤 Speak to the App</button>
    </div>
  </div>

  <div id="main">
    <h1 id="session-title">Select a session from the left to begin</h1>
    <div id="session-desc" style="margin-bottom:20px; color:#555;"></div>
    
    <div id="player-container">
      <div id="youtube-player"></div>
      <div class="progress-container" id="progress-container" style="display:none;">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">0% watched • Resume enabled</div>
      </div>
    </div>

    <button id="complete-btn" class="complete-btn" onclick="completeSession()" style="display:none;">
      ✅ Mark Session Complete & Take Microassessment
    </button>
    
    <div id="assessment-area" class="microassessment" style="display:none;"></div>
  </div>

  <script>
    let sessions = [];
    let currentSessionIndex = null;
    let player = null;
    let progressInterval = null;

    async function loadSessions() {
      const listEl = document.getElementById('session-list');
      listEl.innerHTML = "Loading sessions...";

      try {
        const pillarName = "Pillar 1 — Mental & Emotional Wellness";
        const res = await fetch(`https://wellness-curriculum.eamiller1981.workers.dev/sessions?pillar=${encodeURIComponent(pillarName)}`);
        const data = await res.json();

        sessions = data.results.map(page => {
          const p = page.properties || {};
          return {
            id: page.id,
            microtopic: p.Microtopic?.title?.[0]?.plain_text || "Untitled",
            sessionTitle: p["Session Title"]?.rich_text?.[0]?.plain_text || "",
            source: p.Source?.rich_text?.[0]?.plain_text || "",
            youtubeURL: p["YouTube URL"]?.url || "",
            keyTakeaways: p["Key Takeaways"]?.rich_text?.[0]?.plain_text || "",
            completed: false,
            lastPosition: parseFloat(localStorage.getItem(`progress_${page.id}`)) || 0
          };
        });

        renderSessions();
      } catch (err) {
        listEl.innerHTML = `<p style="color:red;">Load error: ${err.message}</p>`;
      }
    }

    function renderSessions() {
      const container = document.getElementById('session-list');
      container.innerHTML = sessions.map((s, i) => `
        <div class="session ${s.completed ? 'completed' : ''}" onclick="loadSession(${i})">
          ${s.completed ? '✅ ' : ''}${s.microtopic}
        </div>
      `).join('');
    }

    function loadSession(i) {
      currentSessionIndex = i;
      const s = sessions[i];

      document.getElementById('session-title').textContent = s.sessionTitle || s.microtopic;
      document.getElementById('session-desc').innerHTML = `<strong>${s.source}</strong><br>${s.keyTakeaways}`;

      document.getElementById('complete-btn').style.display = 'none';
      document.getElementById('assessment-area').style.display = 'none';
      document.getElementById('progress-container').style.display = 'block';

      if (player) player.destroy();

      const videoId = s.youtubeURL.includes('v=') 
        ? s.youtubeURL.split('v=')[1].split('&')[0] 
        : s.youtubeURL.split('/').pop().split('?')[0];

      player = new YT.Player('youtube-player', {
        height: '390',
        width: '640',
        videoId: videoId,
        playerVars: { autoplay: 1 },
        events: {
          onReady: (e) => {
            if (s.lastPosition > 10) {
              e.target.seekTo(s.lastPosition);
            }
            e.target.playVideo();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              startProgressTracking();
            } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
              saveProgress();
            }
          }
        }
      });
    }

    function startProgressTracking() {
      if (progressInterval) clearInterval(progressInterval);
      progressInterval = setInterval(() => {
        if (!player || !player.getCurrentTime) return;
        const current = player.getCurrentTime();
        const duration = player.getDuration();
        if (duration > 0) {
          const percent = Math.round((current / duration) * 100);
          document.getElementById('progress-fill').style.width = percent + '%';
          document.getElementById('progress-text').textContent = `${percent}% watched`;
        }
      }, 3000);
    }

    function saveProgress() {
      if (!player || currentSessionIndex === null) return;
      const currentTime = player.getCurrentTime();
      const sessionId = sessions[currentSessionIndex].id;
      localStorage.setItem(`progress_${sessionId}`, currentTime);
      sessions[currentSessionIndex].lastPosition = currentTime;
    }

    function completeSession() {
      if (currentSessionIndex === null) return;
      saveProgress();
      sessions[currentSessionIndex].completed = true;
      renderSessions();

      const area = document.getElementById('assessment-area');
      area.style.display = 'block';
      area.innerHTML = `
        <h3>Microassessment — ${sessions[currentSessionIndex].microtopic}</h3>
        <p>Focus on the core concepts from this episode:</p>
        <textarea id="user-answer" rows="5" style="width:100%; margin:10px 0;" placeholder="What were the main ideas? How will you apply them?"></textarea>
        <button onclick="submitAssessment()">Submit Reflection</button>
        <p id="feedback" style="margin-top:15px; color:#28a745;"></p>
      `;
    }

    function submitAssessment() {
      document.getElementById('feedback').innerHTML = '✅ Reflection saved. In the full version this would be AI-scored against the core learning objectives.';
    }

    function speakToApp() {
      const query = prompt("Ask the coach anything about Pillar 1:");
      if (query) alert("AI Coach would provide a targeted recap here (grounded in approved resources).");
    }

    // Save progress when leaving the page
    window.addEventListener('beforeunload', saveProgress);

    window.onload = loadSessions;
  </script>
</body>
</html>
